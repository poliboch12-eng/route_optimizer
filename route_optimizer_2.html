<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оптимизатор маршрутов</title>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1117;--sur:#161b27;--sur2:#1c2333;--brd:#252f42;--brd2:#2e3d58;
  --acc:#2563eb;--acch:#1d4ed8;--accs:#3b82f6;
  --grn:#22c55e;--ylw:#f59e0b;--red:#ef4444;
  --tx:#e2e8f0;--tx2:#94a3b8;--tx3:#4b5f7c;
  --sans:'Golos Text',sans-serif;--mono:'JetBrains Mono',monospace;--r:6px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:14px}
#topbar{height:50px;display:flex;align-items:center;padding:0 18px;gap:16px;background:var(--sur);border-bottom:1px solid var(--brd);flex-shrink:0}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.07em}
.logo b{color:var(--accs)}
.sep{width:1px;height:22px;background:var(--brd)}
.tagline{font-size:11px;color:var(--tx2)}
.ml{margin-left:auto}
.btn-dl{height:32px;padding:0 14px;display:flex;align-items:center;gap:7px;background:transparent;border:1px solid var(--brd2);border-radius:var(--r);color:var(--tx2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s}
.btn-dl:hover:not(:disabled){border-color:var(--accs);color:var(--tx)}
.btn-dl:disabled{opacity:.35;cursor:not-allowed}
.btn-dl svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;flex-shrink:0}
#ws{display:flex;height:calc(100vh - 50px);overflow:hidden}

/* LEFT */
#pl{width:350px;min-width:280px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden}
.ph{padding:11px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pht{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2)}
.badge{background:var(--sur2);border:1px solid var(--brd);border-radius:20px;padding:1px 8px;font-family:var(--mono);font-size:10px;color:var(--tx2)}
#al{flex:1;overflow-y:auto;padding:7px}
#al::-webkit-scrollbar{width:4px}
#al::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}

.ac{background:var(--sur2);border:1px solid var(--brd);border-radius:var(--r);margin-bottom:5px}
.ac.depot{border-left:3px solid var(--accs)}
.ach{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;user-select:none}
.anum{width:22px;height:22px;border-radius:50%;background:var(--acc);color:#fff;font-family:var(--mono);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.anum.d{background:var(--red)}
.aprev{flex:1;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.achev{width:16px;height:16px;fill:none;stroke:var(--tx3);stroke-width:2;transition:transform .18s;flex-shrink:0}
.achev.o{transform:rotate(180deg)}
.ab{display:none;padding:0 10px 10px}
.ab.o{display:block}

.fr{display:flex;gap:7px;margin-top:6px}
.fg{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.fg.full{flex:none;width:100%}
.fl{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3)}
.fi{background:var(--bg);border:1px solid var(--brd);border-radius:var(--r);padding:5px 8px;color:var(--tx);font-family:var(--sans);font-size:12px;width:100%;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--acc)}
.fi.m{font-family:var(--mono)}

.gw{position:relative}
.gr{position:absolute;top:100%;left:0;right:0;z-index:9999;background:var(--sur);border:1px solid var(--brd2);border-radius:var(--r);margin-top:2px;max-height:160px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.gr.o{display:block}
.gi{padding:7px 10px;font-size:11px;cursor:pointer;border-bottom:1px solid var(--brd);color:var(--tx2);line-height:1.4}
.gi:last-child{border-bottom:none}
.gi:hover{background:var(--sur2);color:var(--tx)}
.gi.inf{color:var(--tx3);cursor:default}

.af{display:flex;justify-content:flex-end;margin-top:8px}
.btnrm{background:transparent;border:1px solid var(--brd);border-radius:var(--r);color:var(--tx3);font-family:var(--mono);font-size:10px;padding:3px 10px;cursor:pointer;transition:all .15s}
.btnrm:hover:not(:disabled){border-color:var(--red);color:var(--red)}
.btnrm:disabled{opacity:.3;cursor:not-allowed}

#aw{padding:7px;border-top:1px solid var(--brd);flex-shrink:0}
.btnadd{width:100%;height:33px;display:flex;align-items:center;justify-content:center;gap:8px;background:transparent;border:1px dashed var(--brd2);border-radius:var(--r);color:var(--tx2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s}
.btnadd:hover{border-color:var(--accs);color:var(--tx);background:rgba(59,130,246,.06)}
.btnadd svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2.2;flex-shrink:0}

#sw{padding:9px 8px;border-top:1px solid var(--brd);background:var(--bg);flex-shrink:0}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
select.fi{appearance:none;cursor:pointer}
.btnrun{width:100%;height:40px;display:flex;align-items:center;justify-content:center;gap:9px;background:var(--acc);border:none;border-radius:var(--r);color:#fff;font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.06em;cursor:pointer;transition:background .15s}
.btnrun:hover:not(:disabled){background:var(--acch)}
.btnrun:disabled{background:var(--brd2);cursor:not-allowed}
.sp{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;flex-shrink:0}
.btnrun.run .sp{display:block}
.btnrun.run .rt{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* MAP */
#mw{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%}
#mm{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(14,17,23,.9);border:1px solid var(--brd2);border-radius:20px;padding:5px 16px;font-family:var(--mono);font-size:11px;color:var(--tx2);pointer-events:none;white-space:nowrap;z-index:1000;transition:opacity .3s}
#mm.h{opacity:0}

/* RIGHT */
#pr{width:310px;min-width:260px;flex-shrink:0;background:var(--sur);border-left:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden}
#re{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;color:var(--tx3)}
#re p{font-size:12px;text-align:center;line-height:1.6}
#rc{flex:1;display:none;flex-direction:column;overflow:hidden}
#rc.show{display:flex}
#sg{padding:11px 12px 9px;border-bottom:1px solid var(--brd);display:grid;grid-template-columns:1fr 1fr;gap:7px}
.sc{background:var(--sur2);border:1px solid var(--brd);border-radius:var(--r);padding:7px 10px}
.scl{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3)}
.scv{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--accs);margin-top:2px}
.scv.g{color:var(--grn)}
.scv.y{color:var(--ylw)}
#fr{padding:7px 12px;border-bottom:1px solid var(--brd);font-family:var(--mono);font-size:11px;display:flex;align-items:center;gap:7px}
.fd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fd.ok{background:var(--grn)}
.fd.w{background:var(--ylw)}
#sl{flex:1;overflow-y:auto;padding:6px}
#sl::-webkit-scrollbar{width:4px}
#sl::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}
.stop{display:flex;gap:7px;padding:7px;border-radius:var(--r);cursor:pointer;transition:background .12s}
.stop:hover{background:var(--sur2)}
.stop.act{background:#1a2744;border:1px solid rgba(59,130,246,.35)}
.st{display:flex;flex-direction:column;align-items:center;width:22px;flex-shrink:0}
.sd{width:22px;height:22px;border-radius:50%;background:var(--acc);color:#fff;font-family:var(--mono);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sd.dp{background:var(--red)}
.sd.lt{background:var(--ylw);color:#000}
.sd.er{background:var(--brd2)}
.sl2{width:1px;flex:1;min-height:10px;background:var(--brd);margin-top:3px}
.si{flex:1;min-width:0;padding-top:2px}
.sn{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sa{font-size:11px;color:var(--tx2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stg{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.tag{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:3px;border:1px solid;white-space:nowrap}
.ta{border-color:var(--acc);color:var(--accs)}
.tw{border-color:var(--brd2);color:var(--tx3)}
.ts{border-color:var(--brd);color:var(--tx3)}
.tok{border-color:#166534;color:var(--grn)}
.twn{border-color:#92400e;color:var(--ylw)}
.tlt{border-color:#991b1b;color:var(--red)}

#cw{border-top:1px solid var(--brd);padding:9px 12px 11px;flex-shrink:0}
.cht{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:6px}
#cv{width:100%;height:72px;display:block}

#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#1a0a0a;border:1px solid var(--red);color:var(--red);padding:9px 18px;border-radius:var(--r);font-size:12px;font-family:var(--mono);z-index:99999;display:none;max-width:400px;text-align:center}

.leaflet-popup-content-wrapper{background:var(--sur);border:1px solid var(--brd2);color:var(--tx);border-radius:8px;font-family:var(--mono);font-size:11px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.leaflet-popup-tip{background:var(--sur)}
.leaflet-popup-content{margin:10px 14px;line-height:1.75}
.leaflet-popup-content b{color:var(--accs)}
.leaflet-control-zoom a{background:var(--sur2)!important;color:var(--tx)!important;border-color:var(--brd)!important}
.leaflet-bar{border:1px solid var(--brd)!important}

/* ═══════════ MOBILE ═══════════ */
@media (max-width: 768px) {
  html,body{overflow:auto}
  #topbar{height:44px;padding:0 12px;gap:10px}
  .tagline{display:none}
  #ws{flex-direction:column;height:auto;min-height:calc(100vh - 86px);overflow:visible}
  #mob-tabs{display:flex!important;height:42px;background:var(--sur);border-bottom:1px solid var(--brd);flex-shrink:0;position:sticky;top:44px;z-index:500}
  .mob-tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--tx2);font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.06em;cursor:pointer;transition:all .15s;padding:0}
  .mob-tab.active{color:var(--accs);border-bottom-color:var(--accs)}
  #pl{width:100%;min-width:unset;height:auto;max-height:none;border-right:none;overflow:visible;display:none}
  #pl.mob-show{display:flex}
  #al{max-height:60vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
  #mw{width:100%;height:56vw;min-height:250px;max-height:340px;display:none}
  #mw.mob-show{display:block}
  #pr{width:100%;min-width:unset;height:auto;border-left:none;border-top:1px solid var(--brd);display:none;overflow:visible}
  #pr.mob-show{display:flex}
  #sl{max-height:50vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
  #rc{overflow:visible}
  .fi{font-size:16px;padding:8px 10px}
  .fr{gap:10px}
  .fg{min-width:0}
  .btnrun{height:48px;font-size:14px}
  .btnadd{height:44px}
  .ach{padding:10px 12px}
  .ab.o{display:block;overflow-y:auto;max-height:70vh;-webkit-overflow-scrolling:touch}
  .ac{margin-bottom:8px}
  #sw{padding:12px 10px}
  .btnrun{font-size:13px;letter-spacing:.04em}
}
@media (min-width:769px){
  #mob-tabs{display:none!important}
  #pl{display:flex!important}
  #mw{display:block!important}
  #pr{display:flex!important}
}

</style>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
// ── MOBILE TABS ──────────────────────────────────────────
function mobTab(id, btn) {
  if (window.innerWidth > 768) return;
  ['pl','mw','pr'].forEach(function(p){
    var e=document.getElementById(p);
    if(e) e.classList.remove('mob-show');
  });
  var el=document.getElementById(id);
  if(el) el.classList.add('mob-show');
  document.querySelectorAll('.mob-tab').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  if(id==='mw'&&map) setTimeout(function(){map.invalidateSize();},120);
  window.scrollTo(0,0);
}

function mobInit(){
  if(window.innerWidth<=768){
    document.getElementById('pl').classList.add('mob-show');
  }
}

// Auto-switch to map after optimization on mobile
(function(){
  var orig=runOpt;
  runOpt=function(){
    orig.apply(this,arguments);
    if(window.innerWidth<=768){
      setTimeout(function(){
        var btn=document.querySelectorAll('.mob-tab')[1];
        mobTab('mw',btn);
      },300);
    }
  };
})();

window.addEventListener('load', mobInit);
window.addEventListener('resize',function(){
  if(window.innerWidth>768){
    ['pl','mw','pr'].forEach(function(p){
      var e=document.getElementById(p);
      if(e) e.classList.remove('mob-show');
    });
  } else {
    var any=document.querySelector('#pl.mob-show,#mw.mob-show,#pr.mob-show');
    if(!any) document.getElementById('pl').classList.add('mob-show');
  }
});

</script>

var FUEL_PER_KM = 50;

function renderAll() { renderList(); renderEditMarkers(); }

function renderList() {
  var list = document.getElementById('al');
  list.innerHTML = '';
  document.getElementById('cnt').textContent = addresses.length + ' точек';

  for (var i = 0; i < addresses.length; i++) {
    (function(idx) {
      var a = addresses[idx];
      var isDep = idx === 0;

      var h = '';
      h += '<div class="ach" id="ach'+idx+'">';
      h +=   '<div class="anum'+(isDep?' d':'')+'">'+idx+'</div>';
      h +=   '<div class="aprev" id="aprev'+idx+'">'+ esc(a.name) +'</div>';
      h +=   '<svg class="achev" id="achev'+idx+'" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4"/></svg>';
      h += '</div>';

      else       h += '<button class="btnrm" id="brm'+idx+'">Удалить</button>';

      // events
      document.getElementById('ach'+idx).addEventListener('click', function() { toggleCard(idx); });
      document.getElementById('iname'+idx).addEventListener('input', function() {
        addresses[idx].name = this.value;
        var p = document.getElementById('aprev'+idx); if(p) p.textContent = this.value||('Точка '+idx);
      });
      document.getElementById('iaddr'+idx).addEventListener('input', function() {
        addresses[idx].address = this.value;
        geoDebounce(idx, this.value);
      });
      document.getElementById('ilat'+idx).addEventListener('input', function() {
        var v = parseFloat(this.value); if(!isNaN(v)){addresses[idx].lat=v; renderEditMarkers();}
      });
      document.getElementById('ilon'+idx).addEventListener('input', function() {
        var v = parseFloat(this.value); if(!isNaN(v)){addresses[idx].lon=v; renderEditMarkers();}
      });
      document.getElementById('iwo'+idx).addEventListener('input', function() { addresses[idx].wo = this.value; });
      document.getElementById('iwc'+idx).addEventListener('input', function() { addresses[idx].wc = this.value; });
      document.getElementById('isrv'+idx).addEventListener('input', function() { addresses[idx].srv = parseInt(this.value)||15; });
      if (!isDep) {

    })(i);
  }
}

}

function esc(s) {

}

  addresses.push({
    name:'Точка '+idx, address:'',

function removeAddr(idx) {

function renderEditMarkers() {
  if (!map) return;
  editMarkers.forEach(function(m){ map.removeLayer(m); });
  editMarkers = [];
  for (var i = 0; i < addresses.length; i++) {
    (function(idx) {
      var a = addresses[idx];
      if (!a.lat || !a.lon || isNaN(a.lat) || isNaN(a.lon)) return;
      var color = idx===0 ? '#dc2626' : '#2563eb';
      var icon = L.divIcon({className:'',
        html:'<div style="width:26px;height:26px;border-radius:50%;background:'+color+';border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px;font-family:monospace;box-shadow:0 2px 10px rgba(0,0,0,.6);">'+idx+'</div>',
        iconSize:[26,26], iconAnchor:[13,13]
      });
      var m = L.marker([a.lat, a.lon], {icon:icon, draggable:true})
        .bindTooltip('<b>'+esc(a.name)+'</b>',{direction:'top',offset:[0,-16]})
        .addTo(map);
      m.on('dragend', function(e) {
        var ll = e.target.getLatLng();
        addresses[idx].lat = parseFloat(ll.lat.toFixed(5));
        addresses[idx].lon = parseFloat(ll.lng.toFixed(5));
        var li = document.getElementById('ilat'+idx), lo = document.getElementById('ilon'+idx);
        if(li) li.value = addresses[idx].lat;
        if(lo) lo.value = addresses[idx].lon;
      });
      editMarkers.push(m);
    })(i);
  }
}

// ═══════════════════════════════════════════════════════
//  GEOCODE (Nominatim)
// ═══════════════════════════════════════════════════════
function geoDebounce(idx, q) {
  clearTimeout(geoTimers[idx]);
  var el = document.getElementById('gr'+idx); if(!el) return;
  if (!q || q.length < 3) { el.innerHTML=''; el.classList.remove('o'); return; }
  el.innerHTML = '<div class="gi inf">Поиск...</div>'; el.classList.add('o');
  geoTimers[idx] = setTimeout(function(){ geoFetch(idx, q); }, 600);
}

function geoFetch(idx, q) {
  var el = document.getElementById('gr'+idx); if(!el) return;
  fetch('https://nominatim.openstreetmap.org/search?format=json&limit=5&q='+encodeURIComponent(q),
        {headers:{'Accept-Language':'ru','User-Agent':'RouteOptApp/1.0'}})
    .then(function(r){ return r.json(); })
    .then(function(data) {
      var el2 = document.getElementById('gr'+idx); if(!el2) return;
      if (!data || !data.length) {
        el2.innerHTML='<div class="gi inf">Адрес не найден</div>'; el2.classList.add('o'); return;
      }
      el2.innerHTML = '';
      data.forEach(function(item) {
        var d = document.createElement('div'); d.className='gi';
        d.textContent = item.display_name;
        d.addEventListener('click', function() {
          var lat = parseFloat(item.lat), lon = parseFloat(item.lon);
          addresses[idx].lat = lat; addresses[idx].lon = lon;
          addresses[idx].address = item.display_name;
          var ai = document.getElementById('iaddr'+idx), li = document.getElementById('ilat'+idx), lo = document.getElementById('ilon'+idx);
          if(ai) ai.value = item.display_name;
          if(li) li.value = lat;
          if(lo) lo.value = lon;
          el2.innerHTML=''; el2.classList.remove('o');
          renderEditMarkers();
          if(map) map.flyTo([lat, lon], 15, {duration:0.8});
        });
        el2.appendChild(d);
      });
      el2.classList.add('o');
    })
    .catch(function() {
      var el2 = document.getElementById('gr'+idx); if(!el2) return;
      el2.innerHTML='<div class="gi inf">Ошибка поиска (нет интернета)</div>'; el2.classList.add('o');
    });
}

document.addEventListener('click', function(e) {
  document.querySelectorAll('.gr.o').forEach(function(el) {
    if (!el.parentElement.contains(e.target)) el.classList.remove('o');
  });
});

// ═══════════════════════════════════════════════════════
//  ALGORITHM — ATSP-TW (Genetic + Simulated Annealing)
// ═══════════════════════════════════════════════════════
function tMin(t) { var h=Math.floor(t/60),m=Math.floor(t%60); return (h<10?'0':'')+h+':'+(m<10?'0':'')+m; }
function tParse(s) { var p=s.split(':'); return parseInt(p[0])*60+parseInt(p[1]); }

function buildInstance(addrs) {
  var n = addrs.length;
  var dist = [], time = [], wins = [], srv = [];
  var weather = document.getElementById('swth').value;
  var wf = {clear:1.0, cloudy:0.95, rain:0.80, snow:0.60}[weather]||1.0;
  var asym = document.getElementById('sasy').value === '1';

  for (var i=0;i<n;i++) {
    dist.push([]); time.push([]);
    wins.push([tParse(addrs[i].wo), tParse(addrs[i].wc)]);
    srv.push(addrs[i].srv||15);
    for (var j=0;j<n;j++) {
      if (i===j){dist[i].push(0);time[i].push(0);continue;}
      var lat1=addrs[i].lat,lon1=addrs[i].lon,lat2=addrs[j].lat,lon2=addrs[j].lon;
      var dx=(lon2-lon1)*KM_PER_DEG*Math.cos(lat1*Math.PI/180);
      var dy=(lat2-lat1)*KM_PER_DEG;
      var d=Math.sqrt(dx*dx+dy*dy);
      if(asym && i>0 && j>0) d *= 0.9 + Math.random()*0.2;
      dist[i].push(Math.max(0.3,d));
      time[i].push(Math.max(0.5, d*(1.8+Math.random()*0.8)/wf));
    }
  }
  return {n:n, dist:dist, time:time, wins:wins, srv:srv};
}

function calcCost(inst, route) {
  var c=0;
  for(var i=0;i<route.length-1;i++) c+=inst.dist[route[i]][route[i+1]];
  return c;
}

function calcTimes(inst, route) {
  var t=[tParse(addresses[0].wo)];
  for(var i=1;i<route.length;i++){
    var prev=route[i-1], node=route[i];
    var dep=t[i-1]+(prev>0?inst.srv[prev]:0);
    var arr=dep+inst.time[prev][node];
    var w=inst.wins[node];
    t.push(node===0 ? arr : Math.max(w[0], Math.min(w[1], arr)));
  }
  return t;
}

function calcPenalty(inst, route, times) {
  var p=0;
  for(var i=0;i<route.length;i++){
    var nd=route[i], a=inst.wins[nd][0], b=inst.wins[nd][1], t=times[i];
    if(nd===0){ if(i===route.length-1&&t>b) p+=(t-b)*5; continue; }
    if(t<a) p+=(a-t)*2; else if(t>b) p+=(t-b)*3;
  }
  for(var i=0;i<route.length-1;i++){
    var c=route[i],nx=route[i+1];
    if(nx===0||i+1>=times.length) continue;
    var dep=times[i]+(c>0?inst.srv[c]:0);
    var arr=dep+inst.time[c][nx];
    if(arr>times[i+1]+0.001) p+=(arr-times[i+1])*1.5;
  }
  return p;
}

function evalSol(inst, route, times) {
  var cost=calcCost(inst,route), pen=calcPenalty(inst,route,times);
  var fit;
  if(pen===0)           fit=10000/(cost+1);
  else if(pen<5)        fit=5000/(cost+pen*8+1);
  else if(pen<cost*.1)  fit=1000/(cost+pen*5+1);
  else if(pen<cost*.3)  fit=500/(cost+pen*3+1);
  else if(pen<cost*.5)  fit=100/(cost+pen*2+1);
  else                  fit=10/(pen+1);
  return {route:route,times:times,cost:cost,pen:pen,fit:fit,ok:pen===0};
}

function randRoute(inst) {
  var r=[];for(var i=1;i<inst.n;i++) r.push(i);
  for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=r[i];r[i]=r[j];r[j]=tmp;}
  r=[0].concat(r).concat([0]);
  return evalSol(inst,r,calcTimes(inst,r));
}

function greedyRoute(inst) {
  var u=[];for(var i=1;i<inst.n;i++) u.push(i);
  var r=[0],cur=0;
  while(u.length){
    var best=u[0],bd=inst.dist[cur][u[0]];
    for(var i=1;i<u.length;i++){if(inst.dist[cur][u[i]]<bd){bd=inst.dist[cur][u[i]];best=u[i];}}
    r.push(best); u.splice(u.indexOf(best),1); cur=best;
  }
  r.push(0);
  return evalSol(inst,r,calcTimes(inst,r));
}

function timeRoute(inst) {
  var c=[];for(var i=1;i<inst.n;i++) c.push(i);
  c.sort(function(a,b){return inst.wins[a][0]-inst.wins[b][0];});
  var r=[0].concat(c).concat([0]);
  return evalSol(inst,r,calcTimes(inst,r));
}

function oxCross(inst, p1, p2) {
  var r1=p1.route.slice(1,-1), r2=p2.route.slice(1,-1), sz=r1.length;
  var i1=Math.floor(Math.random()*sz), i2=Math.floor(Math.random()*sz);
  if(i1>i2){var tmp=i1;i1=i2;i2=tmp;}
  var child=new Array(sz).fill(-1);
  for(var i=i1;i<=i2;i++) child[i]=r1[i];
  var p2p=i2+1, cp=i2+1;
  var iters=0;
  while(child.indexOf(-1)!==-1 && iters++<sz*3){
    var v=r2[p2p%sz];
    if(child.indexOf(v)===-1){child[cp%sz]=v;cp++;}
    p2p++;
  }
  var r=[0].concat(child).concat([0]);
  return evalSol(inst,r,calcTimes(inst,r));
}

function mutate(inst, s) {
  var r=s.route.slice();
  if(r.length>4){
    var op=Math.random();
    var a=1+Math.floor(Math.random()*(r.length-2)), b=1+Math.floor(Math.random()*(r.length-2));
    if(a>b){var tmp=a;a=b;b=tmp;}
    if(op<0.4){var tmp=r[a];r[a]=r[b];r[b]=tmp;}
    else{
      var sub=r.slice(a,b+1).reverse();
      for(var i=0;i<sub.length;i++) r[a+i]=sub[i];
    }
  }
  return evalSol(inst,r,calcTimes(inst,r));
}

function saNeighbor(inst, s) {
  var r=s.route.slice(), t=s.times.slice();
  var op=Math.floor(Math.random()*5);
  if(op===4 && t.length>2){
    var idx=1+Math.floor(Math.random()*(t.length-2));
    var nd=r[idx], w=inst.wins[nd];
    t[idx]=Math.max(w[0],Math.min(w[1],t[idx]+(Math.random()*40-20)));
    for(var k=idx+1;k<r.length-1;k++){
      var pn=r[k-1],cn=r[k],dep=t[k-1]+(pn>0?inst.srv[pn]:0);
      var arr=dep+inst.time[pn][cn], wk=inst.wins[cn];
      t[k]=Math.max(wk[0],Math.min(wk[1],arr));
    }
    return evalSol(inst,r,t);
  }
  if(r.length>4){
    var a=1+Math.floor(Math.random()*(r.length-2)), b=1+Math.floor(Math.random()*(r.length-2));
    if(a>b){var tmp=a;a=b;b=tmp;}
    if(op===0){var tmp=r[a];r[a]=r[b];r[b]=tmp;}
    else{var sub=r.slice(a,b+1).reverse();for(var i=0;i<sub.length;i++) r[a+i]=sub[i];}
  }
  return evalSol(inst,r,calcTimes(inst,r));
}

function runSA(inst, sol, maxIter, temp) {
  var cur=sol, best=sol, t=temp||500;
  for(var i=0;i<maxIter;i++){
    var nb=saNeighbor(inst,cur);
    var d=nb.fit-cur.fit;
    if(d>0){cur=nb;if(nb.fit>best.fit) best=nb;}
    else if(Math.random()<Math.exp(d/t)) cur=nb;
    t*=0.93;
    if(t<0.01) break;
  }
  return best;
}

function runGA(inst, popSize, maxGen) {
  var pop=[];
  var ng=Math.max(2,Math.floor(popSize/10));
  for(var i=0;i<ng;i++) pop.push(greedyRoute(inst));
  for(var i=0;i<ng;i++) pop.push(timeRoute(inst));
  for(var i=0;i<Math.max(4,Math.floor(popSize/5));i++)
    pop.push(Math.random()<0.5?greedyRoute(inst):timeRoute(inst));
  while(pop.length<popSize) pop.push(randRoute(inst));

  var best=pop.reduce(function(b,x){return x.fit>b.fit?x:b;}, pop[0]);
  var history=[];

  for(var gen=0;gen<maxGen;gen++){
    pop.sort(function(a,b){return b.fit-a.fit;});
    var elite=pop.slice(0,Math.max(3,Math.floor(popSize/7)));
    var newPop=elite.slice();

    while(newPop.length<popSize){
      var k=3, t1=pop.slice(0,Math.min(pop.length,10)), t2=pop.slice(0,Math.min(pop.length,10));
      var p1=t1.reduce(function(b,x){return x.fit>b.fit?x:b;},t1[0]);
      var p2=t2.reduce(function(b,x){return x.fit>b.fit?x:b;},t2[0]);
      var child=Math.random()<0.9 ? oxCross(inst,p1,p2) : (p1.fit>p2.fit?p1:p2);
      if(Math.random()<(child.ok?0.2:0.3)) child=mutate(inst,child);
      newPop.push(child);
    }
    pop=newPop;

    if(gen%15===0 && gen>0){
      var inf=[], feas=[];
      for(var i=0;i<pop.length;i++){if(pop[i].ok) feas.push(i); else inf.push(i);}
      var ni=Math.min(inf.length,Math.floor(popSize*0.15));
      var nf=Math.min(feas.length,Math.floor(popSize*0.1));
      var idxs=[];
      for(var i=0;i<ni;i++) idxs.push(inf[Math.floor(Math.random()*inf.length)]);
      for(var i=0;i<nf;i++) idxs.push(feas[Math.floor(Math.random()*feas.length)]);
      for(var i=0;i<idxs.length;i++) pop[idxs[i]]=runSA(inst,pop[idxs[i]],150,300);
    }

    var cb=pop.reduce(function(b,x){return x.fit>b.fit?x:b;},pop[0]);
    if(cb.fit>best.fit) best=cb;
    var fc=pop.filter(function(x){return x.ok;}).length;
    history.push({gen:gen,cost:best.cost,pen:best.pen,fc:fc});

    if(gen>50&&best.ok&&fc>popSize*0.8&&history.length>=10){
      var stable=true;
      for(var i=1;i<=10;i++){if(Math.abs(history[history.length-i].cost-best.cost)>0.5){stable=false;break;}}
      if(stable) break;
    }
  }

  var final=runSA(inst,best,400,500);
  if(final.fit>best.fit) best=final;
  return {best:best, history:history};
}

// ═══════════════════════════════════════════════════════
//  BUILD SCHEDULE
// ═══════════════════════════════════════════════════════
function buildSchedule(inst, best) {
  var sched=[];
  for(var i=0;i<best.route.length;i++){
    var nd=best.route[i], t=best.times[i];
    var a=inst.wins[nd][0], b=inst.wins[nd][1];
    var status;
    if(nd===0) status='depot';
    else if(Math.floor(t)<a) status='early';
    else if(Math.floor(t)>b) status='late';
    else status='on_time';
    var entry={
      i:i, node:nd, name:addresses[nd].name, address:addresses[nd].address,
      lat:addresses[nd].lat, lon:addresses[nd].lon,
      arr:t, arrS:tMin(t),
      dep:t+(i<best.route.length-1?inst.srv[nd]:0),
      wo:a, wc:b, woS:tMin(a), wcS:tMin(b),
      srv:inst.srv[nd], status:status, isDepot:nd===0
    };
    if(status==='early') entry.wait=a-Math.floor(t);
    if(status==='late')  entry.delay=Math.floor(t)-b;
    if(i<best.route.length-1){
      var nx=best.route[i+1];
      entry.distNext=inst.dist[nd][nx];
      entry.timeNext=inst.time[nd][nx];
      entry.etaNext=entry.dep+entry.timeNext;
      entry.etaNextS=tMin(entry.etaNext);
    }
    sched.push(entry);
  }
  return sched;
}

// ═══════════════════════════════════════════════════════
//  RUN OPTIMIZATION
// ═══════════════════════════════════════════════════════
function runOpt() {
  if(addresses.length<2){toast('Необходимо минимум 2 точки');return;}
  var btn=document.getElementById('btnrun');
  btn.classList.add('run'); btn.disabled=true;
  setMsg('Выполняется оптимизация...');

  setTimeout(function(){
    try{
      var inst=buildInstance(addresses);
      var popSize=parseInt(document.getElementById('spop').value)||40;
      var maxGen=parseInt(document.getElementById('sgen').value)||50;
      var res=runGA(inst,popSize,maxGen);
      var best=res.best, history=res.history;
      var sched=buildSchedule(inst,best);
      var cost=best.cost, fuel=cost*FUEL_PER_KM, pen=best.pen*PEN_PER_MIN, total=fuel+pen;
      lastSchedule=sched;
      lastSolution={best:best,cost:cost,fuel:fuel,pen:pen,total:total,feasible:best.ok};
      renderResults(sched,best,history,cost,fuel,pen,total);
      drawRouteMarkers(sched);
      fetchRoadRoute(sched);
      document.getElementById('btndl').disabled=false;
    }catch(e){toast('Ошибка: '+e.message);console.error(e);}
    btn.classList.remove('run'); btn.disabled=false;
  }, 50);
}

// ═══════════════════════════════════════════════════════
//  RENDER RESULTS
// ═══════════════════════════════════════════════════════
function renderResults(sched,best,history,cost,fuel,pen,total){
  document.getElementById('re').style.display='none';
  var rc=document.getElementById('rc'); rc.classList.add('show');
  document.getElementById('vdist').textContent=cost.toFixed(1)+' км';
  document.getElementById('vtotal').textContent=Math.round(total).toLocaleString('ru')+' руб';
  document.getElementById('vfuel').textContent=Math.round(fuel).toLocaleString('ru')+' руб';
  document.getElementById('vgen').textContent=history.length;

  var fd=document.getElementById('fd'), ft=document.getElementById('ft');
  if(best.ok){fd.className='fd ok';ft.textContent='Все временные окна соблюдены';ft.style.color='var(--grn)';}
  else{fd.className='fd w';ft.textContent='Нарушения: '+best.pen.toFixed(1)+' мин';ft.style.color='var(--ylw)';}

  var sl=document.getElementById('sl'); sl.innerHTML='';
  sched.forEach(function(p,idx){
    var isLast=idx===sched.length-1;
    var dc=p.isDepot?'dp':(p.status==='late'?'lt':(p.status==='early'?'er':''));
    var tags='<span class="tag ta">'+p.arrS+'</span>';
    tags+='<span class="tag tw">'+p.woS+'&ndash;'+p.wcS+'</span>';
    tags+='<span class="tag ts">'+p.srv+' мин</span>';
    if(p.status==='on_time') tags+='<span class="tag tok">в окне</span>';
    else if(p.status==='early') tags+='<span class="tag twn">ожидание '+p.wait+' мин</span>';
    else if(p.status==='late')  tags+='<span class="tag tlt">опоздание '+p.delay+' мин</span>';
    var div=document.createElement('div');
    div.className='stop'; div.id='stop'+idx;
    div.innerHTML='<div class="st"><div class="sd '+dc+'">'+(idx+1)+'</div>'+(isLast?'':'<div class="sl2"></div>')+'</div>'+
      '<div class="si"><div class="sn">'+esc(p.name)+'</div><div class="sa">'+esc(p.address)+'</div><div class="stg">'+tags+'</div></div>';
    (function(i,pt){
      div.addEventListener('click',function(){
        document.querySelectorAll('.stop').forEach(function(el){el.classList.remove('act');});
        document.getElementById('stop'+i).classList.add('act');
        if(map&&routeMarkers[i]){map.flyTo([pt.lat,pt.lon],15,{duration:.8});routeMarkers[i].openPopup();}
      });
    })(idx,p);
    sl.appendChild(div);
  });

  drawChart(history);
}

// ═══════════════════════════════════════════════════════
//  MAP ROUTE MARKERS
// ═══════════════════════════════════════════════════════
function drawRouteMarkers(sched){
  if(!map) return;
  editMarkers.forEach(function(m){map.removeLayer(m);}); editMarkers=[];
  routeMarkers.forEach(function(m){map.removeLayer(m);}); routeMarkers=[];
  sched.forEach(function(p,idx){
    var color=p.isDepot?'#dc2626':(p.status==='late'?'#b45309':'#2563eb');
    var icon=L.divIcon({className:'',
      html:'<div style="width:26px;height:26px;border-radius:50%;background:'+color+';border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px;font-family:monospace;box-shadow:0 2px 10px rgba(0,0,0,.6);">'+(idx+1)+'</div>',
      iconSize:[26,26],iconAnchor:[13,13]
    });
    var extra='';
    if(p.status==='early') extra='<br>Ожидание: '+p.wait+' мин';
    else if(p.status==='late') extra='<br><span style="color:#f59e0b">Опоздание: '+p.delay+' мин</span>';
    var popup='<b>'+esc(p.name)+'</b><br>'+esc(p.address)+'<br>Прибытие: '+p.arrS+'<br>Окно: '+p.woS+'&ndash;'+p.wcS+'<br>Обслуживание: '+p.srv+' мин'+extra;
    var m=L.marker([p.lat,p.lon],{icon:icon}).bindPopup(popup,{maxWidth:240}).addTo(map);
    routeMarkers.push(m);
  });
}

function fetchRoadRoute(sched){
  if(!map) return;
  if(routeLine){map.removeLayer(routeLine);routeLine=null;}
  var wps=sched.map(function(p){return p.lon+','+p.lat;}).join(';');
  var urls=[
    'https://router.project-osrm.org/route/v1/driving/'+wps+'?overview=full&geometries=geojson',
    'https://routing.openstreetmap.de/routed-car/route/v1/driving/'+wps+'?overview=full&geometries=geojson'
  ];
  function tryUrl(i){
    if(i>=urls.length){
      var lls=sched.map(function(p){return [p.lat,p.lon];});
      routeLine=L.polyline(lls,{color:'#f59e0b',weight:3,opacity:.7,dashArray:'8 6'}).addTo(map);
      map.fitBounds(L.latLngBounds(lls),{padding:[30,30]});
      setMsg('Прямые линии (OSRM недоступен)',true); return;
    }
    setMsg('Загрузка маршрута по дорогам...');
    var ctrl=new AbortController(), tid=setTimeout(function(){ctrl.abort();},9000);
    fetch(urls[i],{signal:ctrl.signal})
      .then(function(r){clearTimeout(tid);return r.json();})
      .then(function(d){
        if(d.code!=='Ok'||!d.routes||!d.routes.length){tryUrl(i+1);return;}
        var coords=d.routes[0].geometry.coordinates.map(function(c){return[c[1],c[0]];});
        routeLine=L.polyline(coords,{color:'#3b82f6',weight:4,opacity:.85}).addTo(map);
        map.fitBounds(L.latLngBounds(coords),{padding:[30,30]});
        setMsg('Маршрут по дорогам загружен',true);
      })
      .catch(function(){clearTimeout(tid);tryUrl(i+1);});
  }
  tryUrl(0);
}

// ═══════════════════════════════════════════════════════
//  CHART
// ═══════════════════════════════════════════════════════
function drawChart(history){
  var canvas=document.getElementById('cv'); if(!canvas||history.length<2) return;
  var W=canvas.offsetWidth,H=72,dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
  var ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  var costs=history.map(function(h){return h.cost;});
  var minC=Math.min.apply(null,costs),maxC=Math.max.apply(null,costs),range=maxC-minC||1;
  var p={t:5,b:16,l:32,r:5},cw=W-p.l-p.r,ch=H-p.t-p.b;
  ctx.fillStyle='#0b0f1a';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#1c2333';ctx.lineWidth=1;
  for(var g=0;g<=3;g++){
    var gy=p.t+(ch/3)*g; ctx.beginPath();ctx.moveTo(p.l,gy);ctx.lineTo(W-p.r,gy);ctx.stroke();
    ctx.fillStyle='#4b5f7c';ctx.font='9px monospace';ctx.textAlign='right';
    ctx.fillText((maxC-(range/3)*g).toFixed(1),p.l-2,gy+3);
  }
  ctx.beginPath();
  costs.forEach(function(c,i){var x=p.l+(i/(costs.length-1))*cw,y=p.t+((maxC-c)/range)*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.lineTo(p.l+cw,p.t+ch);ctx.lineTo(p.l,p.t+ch);ctx.closePath();
  ctx.fillStyle='rgba(37,99,235,.13)';ctx.fill();
  var grd=ctx.createLinearGradient(p.l,0,W-p.r,0);grd.addColorStop(0,'#1d4ed8');grd.addColorStop(1,'#3b82f6');
  ctx.beginPath();ctx.strokeStyle=grd;ctx.lineWidth=2;
  costs.forEach(function(c,i){var x=p.l+(i/(costs.length-1))*cw,y=p.t+((maxC-c)/range)*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.stroke();
  ctx.fillStyle='#4b5f7c';ctx.font='9px monospace';ctx.textAlign='center';
  var st=Math.max(1,Math.floor(costs.length/5));
  for(var k=0;k<costs.length;k+=st){ctx.fillText(history[k].gen,p.l+(k/(costs.length-1))*cw,H-2);}
}

// ═══════════════════════════════════════════════════════
function dlInstructions(){
  if(!lastSchedule||!lastSolution){toast('Нет данных');return;}
  var s=lastSolution, sched=lastSchedule;
  var now=new Date(), dt=now.toLocaleDateString('ru')+' '+now.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  var lines=[
    '========================================================================',
    'МАРШРУТНЫЙ ЛИСТ ДОСТАВКИ',
    'Сформировано: '+dt,
    '========================================================================',
    '',
    'ЭКОНОМИКА МАРШРУТА',
    '  Расстояние       : '+s.cost.toFixed(1)+' км',
    '  Стоимость топлива: '+Math.round(s.fuel)+' руб  ('+FUEL_PER_KM+' руб/км)',
    '  Штрафы           : '+Math.round(s.pen)+' руб',
    '  ИТОГО            : '+Math.round(s.total)+' руб',
    '  Статус           : '+(s.feasible?'ВСЕ ВРЕМЕННЫЕ ОКНА СОБЛЮДЕНЫ':'НАРУШЕНИЯ: '+s.best.pen.toFixed(1)+' мин'),
    '',
    'МАРШРУТ',
    '------------------------------------------------------------------------'
  ];
  sched.forEach(function(p){
    var m=p.isDepot?'[СКЛАД]':'['+p.i+']';
    lines.push('');
    lines.push(m+'  '+p.name);
    lines.push('  Адрес         : '+p.address);
    lines.push('  Прибытие      : '+p.arrS);
    lines.push('  Окно          : '+p.woS+' -- '+p.wcS);
    if(p.status==='early') lines.push('  ОЖИДАНИЕ      : '+p.wait+' мин до открытия');
    if(p.status==='late')  lines.push('  ОПОЗДАНИЕ     : '+p.delay+' мин');
    lines.push('  Обслуживание  : '+p.srv+' мин');
    lines.push('  Выезд         : '+tMin(p.dep));
    if(p.distNext!=null){
      lines.push('  Следующий     : '+p.distNext.toFixed(1)+' км  (~'+Math.round(p.timeNext)+' мин)');
      lines.push('  Прибытие след.: '+p.etaNextS);
    }
  });
  lines.push('');
  lines.push('========================================================================');
  lines.push('ПАМЯТКА ВОДИТЕЛЯ');
  lines.push('1. Звоните клиенту за 10-15 минут до прибытия.');
  lines.push('2. Пробки: утро 07:00-10:00, вечер 16:00-20:00.');
  lines.push('3. При опоздании немедленно уведомляйте диспетчера.');
  lines.push('4. Закладывайте 10 мин запаса на парковку.');
  lines.push('========================================================================');

  var blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='marshrut_'+now.toISOString().slice(0,10)+'.txt';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

//  HELPERS
// ═══════════════════════════════════════════════════════
function setMsg(txt, hide){
  var el=document.getElementById('mm'); el.textContent=txt; el.classList.remove('h');
  if(hide) setTimeout(function(){el.classList.add('h');},3000);
}
function toast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(function(){t.style.display='none';},4000);
}

// ── MOBILE TABS ──────────────────────────────────────────
function mobTab(id, btn) {
  if (window.innerWidth > 768) return;
  ['pl','mw','pr'].forEach(function(p){
    var e=document.getElementById(p);
    if(e) e.classList.remove('mob-show');
  });
  var el=document.getElementById(id);
  if(el) el.classList.add('mob-show');
  document.querySelectorAll('.mob-tab').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  if(id==='mw'&&map) setTimeout(function(){map.invalidateSize();},120);
  window.scrollTo(0,0);
}

function mobInit(){
  if(window.innerWidth<=768){
    document.getElementById('pl').classList.add('mob-show');
  }
}

// Auto-switch to map after optimization on mobile
(function(){
  var orig=runOpt;
  runOpt=function(){
    orig.apply(this,arguments);
    if(window.innerWidth<=768){
      setTimeout(function(){
        var btn=document.querySelectorAll('.mob-tab')[1];
        mobTab('mw',btn);
      },300);
    }
  };
})();

window.addEventListener('load', mobInit);
window.addEventListener('resize',function(){
  if(window.innerWidth>768){
    ['pl','mw','pr'].forEach(function(p){
      var e=document.getElementById(p);
      if(e) e.classList.remove('mob-show');
    });
  } else {
    var any=document.querySelector('#pl.mob-show,#mw.mob-show,#pr.mob-show');
    if(!any) document.getElementById('pl').classList.add('mob-show');
  }
});
